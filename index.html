<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SE Time</title>

    <link rel="icon" type="image/png" href="/images/SE_Logo_WT_NoBg.png">

    <style>
        :root {
            --primary: #ee1c25;
            --secondary: #c8c9cb;
            --dark: #111111;
            --text: #1f2937;
            --muted: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(238,28,37,0.14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(238,28,37,0.10), transparent 30%),
                linear-gradient(to bottom, #ffffff, #f3f4f6);
            color: var(--text);
            overflow-x: hidden;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(238,28,37,0.18), transparent 70%);
            z-index: 0;
        }

        .hero::after {
            content: "";
            position: absolute;
            bottom: -250px;
            right: -250px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(238,28,37,0.14), transparent 70%);
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            position: relative;
            z-index: 1;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 60px;
            align-items: center;
        }

        .brand-logo {
            width: 320px;
            max-width: 100%;
            margin-bottom: 36px;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.08));
        }

        h1 {
            margin: 0;
            font-size: 4.4rem;
            line-height: 1.02;
            letter-spacing: -3px;
            color: var(--dark);
        }

        h1 .highlight {
            color: var(--primary);
        }

        .subtitle {
            margin-top: 30px;
            font-size: 1.22rem;
            line-height: 1.9;
            color: var(--muted);
            max-width: 620px;
        }

        .buttons {
            display: flex;
            gap: 18px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 30px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ee1c25, #ff4c55);
            color: white;
            box-shadow:
                0 12px 30px rgba(238,28,37,0.28),
                0 0 40px rgba(238,28,37,0.12);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid rgba(238,28,37,0.15);
        }

        .btn-secondary:hover {
            background: rgba(238,28,37,0.04);
        }

        .phone-wrapper {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .phone-glow {
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(238,28,37,0.18), transparent 70%);
            top: 50%;
            transform: translateY(-50%);
            z-index: 0;
        }

        .phone {
            position: relative;
            z-index: 1;
            width: 290px;
            height: 590px;
            border-radius: 42px;
            background: white;
            border: 10px solid #111;
            overflow: hidden;
            box-shadow:
                0 40px 60px rgba(0,0,0,0.22),
                0 0 60px rgba(238,28,37,0.12);
        }

        .phone-top {
            height: 80px;
            background: linear-gradient(135deg, #ee1c25, #ff4c55);
        }

        .phone-content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100% - 80px);
            padding: 40px;
            background:
                radial-gradient(circle at top left, rgba(238,28,37,0.06), transparent 30%),
                white;
        }

        .phone-logo {
            width: 180px;
            max-width: 100%;
        }

        .status-section {
            margin-top: 80px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .status-card {
            background: rgba(255,255,255,0.76);
            backdrop-filter: blur(12px);
            border-radius: 26px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow:
                0 10px 30px rgba(0,0,0,0.04),
                0 0 40px rgba(238,28,37,0.04);
        }

        .status-title {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .status-value {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--dark);
        }

        .online {
            color: #22c55e;
        }

        footer {
            margin-top: 80px;
            text-align: center;
            padding-bottom: 50px;
            color: var(--muted);
        }

        footer a {
            color: var(--muted);
            text-decoration: none;
            margin: 0 14px;
            transition: 0.2s ease;
        }

        footer a:hover {
            color: var(--primary);
        }

        .footer-logo {
            width: 130px;
            margin-bottom: 24px;
            opacity: 0.95;
        }

        @media (max-width: 950px) {

            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .brand-logo {
                margin-left: auto;
                margin-right: auto;
            }

            .subtitle {
                margin-left: auto;
                margin-right: auto;
            }

            .buttons {
                justify-content: center;
            }

            h1 {
                font-size: 3rem;
            }

            .phone {
                width: 240px;
                height: 500px;
            }
        }

        @media (max-width: 600px) {

            h1 {
                font-size: 2.3rem;
                letter-spacing: -1px;
            }

            .brand-logo {
                width: 240px;
            }

            .phone {
                width: 210px;
                height: 430px;
            }

            .phone-logo {
                width: 130px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">

        <div class="container">

            <div class="hero-grid">

                <div>

                    <img
                        class="brand-logo"
                        src="/images/SE_Logo_NoBg_Light.png"
                        alt="SE Time Logo">

                    <h1>
                        God tidskontroll.
                        <br />
                        <span class="highlight">
                            Bedre resultater.
                        </span>
                    </h1>

                    <p class="subtitle">
                        SE Time brukes til å registrere timer, administrere prosjekter og oppgaver - På Windows, iOS og Android
                        <!--SE Time helps organizations track time,
                        manage projects and collaborate efficiently —
                        across Windows, iOS and Android.-->
                    </p>

                    <div class="buttons">

                        <!--<a class="btn btn-primary" href="#">
                            Open App
                        </a>-->

                        <a class="btn btn-secondary" href="/privacy.html">
                            Personvern
                        </a>

                    </div>

                </div>

                <div class="phone-wrapper">

                    <div class="phone-glow"></div>

                    <div class="phone">

                        <div class="phone-top"></div>

                        <div class="phone-content">

                            <img
                                class="phone-logo"
                                src="/images/SE_Logo_WT_NoBg.png"
                                alt="SE Time">

                        </div>

                    </div>

                </div>

            </div>

            <div class="status-section">

                <div class="status-card">

                    <div class="status-title">
                        API Status
                    </div>

                    <div class="status-value online">
                        ● Aktiv
                    </div>

                </div>

                <div class="status-card">

                    <div class="status-title">
                        Plattform
                    </div>

                    <div class="status-value">
                        .NET MAUI Blazor
                    </div>

                </div>

                <div class="status-card">

                    <div class="status-title">
                        Tilgjengelighet
                    </div>

                    <div class="status-value">
                        Windows, iOS & Android
                    </div>

                </div>

            </div>

            <footer>

                <img
                    class="footer-logo"
                    src="/images/SE_Logo_NoBg_Light.png"
                    alt="SE Time">

                <div>

                    <a href="/privacy.html">
                        Personvern
                    </a>

                    <a href="andreas@sondre-eiendom.no">
                        Support
                    </a>

                </div>

            </footer>

        </div>

    </section>

</body>
</html>
