<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WasteOfTime</title>

    <style>
        :root {
            --primary: #ee1c25;
            --secondary: #c8c9cb;
            --background: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .card {
            background: rgba(31, 41, 55, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow:
                0 10px 30px rgba(0,0,0,0.35),
                0 0 80px rgba(238, 28, 37, 0.08);
        }

        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 24px auto;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--primary), #ff5a62);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 25px rgba(238, 28, 37, 0.35);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: -1px;
        }

        .subtitle {
            margin-top: 18px;
            color: var(--secondary);
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .status-grid {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .status-card {
            background: rgba(255,255,255,0.04);
            border-radius: 18px;
            padding: 22px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-title {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .status-value {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .online {
            color: #4ade80;
        }

        .footer {
            margin-top: 36px;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer a {
            color: var(--secondary);
            text-decoration: none;
            transition: 0.2s ease;
        }

        .footer a:hover {
            color: white;
        }

        .highlight {
            color: var(--primary);
        }

        @media (max-width: 640px) {
            .card {
                padding: 32px 24px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="card">

            <div class="logo">
                W
            </div>

            <h1>
                Waste<span class="highlight">Of</span>Time
            </h1>

            <p class="subtitle">
                Time tracking and project management for modern organizations.
            </p>

            <div class="status-grid">

                <div class="status-card">
                    <div class="status-title">
                        API Status
                    </div>

                    <div class="status-value online">
                        ● Online
                    </div>
                </div>

                <div class="status-card">
                    <div class="status-title">
                        Platform
                    </div>

                    <div class="status-value">
                        .NET MAUI Application
                    </div>
                </div>

            </div>

            <div class="footer">
                <a href="/privacy.html">
                    Personvern
                </a>

                <a href="andreas@sondre-eiendom.no">
                    Support
                </a>
            </div>

        </div>

    </div>
</body>
</html>
